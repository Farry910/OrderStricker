services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - orderstricker_mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - orderstricker_redis_data:/data

volumes:
  orderstricker_mongo_data: {}
  orderstricker_redis_data: {}
